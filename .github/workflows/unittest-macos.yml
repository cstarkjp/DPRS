name: macOS

on:
  # release:
  #   types: [published]
  push:
    branches:
      - unittests

permissions:
  contents: read

jobs:
  test-macos:
    runs-on: macos-latest
    steps:
      - name: Install DPRS
        uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install Python
        run: |
          python -m pip install --upgrade pip
          pip install dprs
      - name: Check repo
        run: |
          ls -l $HOME/work/DPRS/dprs_py
      - name: Run unit tests
        run: |
          cd $HOME/work/dprs_py/tests
          ls -l .     
          python -m unittest discover tests
      - name: Run demo dp_1d.py in Python
        run: |
          cd $HOME/work/dprs_py/demos
          python dp_1d.py
