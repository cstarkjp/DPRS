<!doctype html>
<html lang="en-US">

<head>
    <link rel="stylesheet" href="../assets/main.484c7ddc.min.css">
    <meta charset="utf-8" />
    <title>Draw</title>
</head>

<body class="dn">
    <link href="index.css" rel="stylesheet" type="text/css" />
    <script type="module" src="./dk.js"></script>
    <h1>Directed Percolation (1D) example</h1>
    Enter the data for the simulation
    <table>
        <tr>
            <td>
                <table>
                    <tr>
                        <td>
                            <input id="width" type="text" name="width" value="400" />
                            <label for="width">n_x</label>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
        <tr>
            <td>
                <table>
                    <tr>
                        <td>
                            <input id="p_initial" class="probability" type="text" name="p_initial" />
                            <label for="p_initial">p_initial</label>
                        </td>
                        <td>
                            <input class="probability" id="p_1" type="text" name="p_1" value="0.805" />
                            <label for="p_1">p_1</label>
                        </td>
                        <td>
                            <input class="probability" id="p_2" type="text" name="p_2" value="0.805" />
                            <label for="p_2">p_2</label>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>

        <tr>
            <td>
                <table>
                    <tr>
                        <td>
                            <input id="n_iterations" type="text" name="n_iterations" value="1000" />
                            <label for="n_iterations">n_iterations</label>
                        </td>
                        <td>
                            <input id="sample_period" type="text" name="sample_period" value="20" />
                            <label for="sample_period">sample period</label>
                        </td>
                        <td>
                            <input id="random_seed" type="text" name="random_seed" value="1" />
                            <label for="random_seed">random seed</label>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
        <tr>
            <td>
                <input type="checkbox" value="1" name="staggered" />
                <label for="staggered">Run Staggered DK</label>
            </td>
            <td>
                <input type="checkbox" value="1" name="staggered" />
                <label for="staggered">Run Non-Staggered DK</label>
            </td>
        </tr>
        <tr>
            <td>
                <input id="zoom" type="range" value="0.1" min="1.0" max="10" onclick="window.main.redraw()"
                    name="zoom" />
                <label for="zoom">Zoom</label>
            </td>
            <td>
                <input id="stagger" type="checkbox" value="1" name="stagger" onclick="window.main.redraw()" />
                <label for="stagger">Stagger</label>
            </td>
        </tr>
        <tr>
            <td>
                <input type="button" value="Run simulation" onclick="window.main.run_simulation()" />
            </td>
        </tr>
    </table>
    <div id="Visualize"></div>
    <div id="Log"></div>
</body>

</html>
